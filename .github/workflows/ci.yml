name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: sanity
    runs-on: ubuntu-latest

    steps:
      - name: check out code
        uses: actions/checkout@v4

      - name: check for trailing whitespace
        run: |
          set -euo pipefail

          if git grep -nI '[[:blank:]]$' -- .; then
            echo "found trailing whitespace"
            exit 1
          fi

      - name: validate yaml
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require "psych"

          Dir.glob(".github/workflows/*.{yml,yaml}").sort.each do |path|
            Psych.parse_stream(File.read(path))
            puts "validated #{path}"
          end

          skills = Dir.glob("skills/*/SKILL.md").sort
          abort "no skills found" if skills.empty?

          skills.each do |path|
            contents = File.read(path)
            frontmatter = contents.match(/\A---\n(.*?)\n---\n/m)
            abort "missing frontmatter: #{path}" unless frontmatter

            metadata = Psych.safe_load(frontmatter[1])
            directory = File.basename(File.dirname(path))
            abort "skill name does not match directory: #{path}" unless metadata["name"] == directory
            abort "missing skill description: #{path}" unless metadata["description"].is_a?(String) && !metadata["description"].empty?

            agent = File.join(File.dirname(path), "agents", "openai.yaml")
            abort "missing agent metadata: #{path}" unless File.file?(agent)
            Psych.safe_load(File.read(agent))
            puts "validated #{path}"
          end
          RUBY

      - name: test installer
        run: python3 -m unittest discover -s tests
